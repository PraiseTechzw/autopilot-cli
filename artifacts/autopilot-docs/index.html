<!DOCTYPE html>
<html lang="en" suppresshydrationwarning="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1220" />
    <title>Autopilot CLI - Intelligent Git Automation</title>
    <meta name="description" content="Automate your Git workflow with Autopilot CLI. Smart commits, background syncing, and safety rails for developers." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script>
      (function() {
        try {
          var storageKey = 'autopilot-theme';
          var theme = localStorage.getItem(storageKey);
          var support = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var d = document.documentElement;
          d.classList.remove('light', 'dark');
          if (theme === 'dark' || (!theme && support)) {
            d.classList.add('dark');
          } else {
            d.classList.add('light');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="antialiased min-h-screen flex flex-col">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

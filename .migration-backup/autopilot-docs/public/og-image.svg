<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Autopilot CLI release banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="50%" stop-color="#050816" />
      <stop offset="100%" stop-color="#0b1220" />
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8ff1f" />
      <stop offset="45%" stop-color="#7ae52b" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>
    <linearGradient id="soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="990" cy="110" r="220" fill="url(#green)" opacity="0.08" />
  <circle cx="160" cy="520" r="180" fill="url(#green)" opacity="0.06" />
  <path d="M0 510C180 450 250 560 420 510S700 430 860 500s210 80 340 45v85H0z" fill="#111827" opacity="0.55" />

  <g transform="translate(84 86)" filter="url(#shadow)">
    <rect x="0" y="0" width="1032" height="458" rx="36" fill="#050816" stroke="#273244" stroke-width="1.5" />

    <g transform="translate(56 52)">
      <rect x="0" y="0" width="140" height="46" rx="23" fill="url(#green)" />
      <text x="70" y="30" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="900" fill="#000000">
        v4.0.0
      </text>
    </g>

    <g transform="translate(56 146)">
      <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="70" font-weight="900" fill="#ffffff">
        Autopilot CLI
      </text>
      <text x="0" y="56" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" fill="#cbd5e1">
        Intelligent Git automation with the real brand palette.
      </text>
    </g>

    <g transform="translate(56 262)">
      <rect x="0" y="0" width="440" height="138" rx="22" fill="#0b1220" stroke="#293547" />
      <text x="24" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="#b8ff1f">
        Autopilot sequence
      </text>
      <text x="24" y="68" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#e5e7eb">
        git add -A
      </text>
      <text x="24" y="96" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#e5e7eb">
        git diff --cached --quiet
      </text>
      <text x="24" y="124" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#e5e7eb">
        git commit → git push → leaderboard
      </text>
    </g>

    <g transform="translate(522 262)">
      <rect x="0" y="0" width="454" height="138" rx="22" fill="#0b1220" stroke="#293547" />
      <text x="24" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="#b8ff1f">
        Brand cues
      </text>
      <text x="24" y="68" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#e5e7eb">
        Black base with lime green core accent
      </text>
      <text x="24" y="96" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#e5e7eb">
        White typography for the wordmark
      </text>
      <text x="24" y="124" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#e5e7eb">
        Slate rings and trims for contrast
      </text>
    </g>

    <g transform="translate(852 50)">
      <circle cx="58" cy="58" r="52" fill="none" stroke="url(#soft)" stroke-width="4" opacity="0.95" />
      <circle cx="58" cy="58" r="26" fill="none" stroke="#b8ff1f" stroke-width="3" opacity="0.92" stroke-dasharray="2 4" />
      <path d="M41 50L54 37L54 43H77V49H54V55Z" fill="url(#green)" />
      <path d="M75 63L61 77L61 71H38V65H61V59Z" fill="#ffffff" opacity="0.96" />
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <style>
      .title { font-family: sans-serif; font-weight: 800; font-size: 84px; fill: white; }
      .subtitle { font-family: sans-serif; font-weight: 400; font-size: 32px; fill: #94A3B8; }
      .version { font-family: monospace; font-size: 24px; fill: #3B82F6; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />
  
  <!-- Subtle Grid Pattern -->
  <path d="M0 0 L1200 0 M0 100 L1200 100 M0 200 L1200 200 M0 300 L1200 300 M0 400 L1200 400 M0 500 L1200 500 M0 600 L1200 600" stroke="#FFFFFF" stroke-opacity="0.03" fill="none" />
  <path d="M0 0 L0 630 M100 0 L100 630 M200 0 L200 630 M300 0 L300 630 M400 0 L400 630 M500 0 L500 630 M600 0 L600 630 M700 0 L700 630 M800 0 L800 630 M900 0 L900 630 M1000 0 L1000 630 M1100 0 L1100 630" stroke="#FFFFFF" stroke-opacity="0.03" fill="none" />

  <!-- Logo Icon -->
  <g transform="translate(100, 215) scale(2.5)">
    <path d="M-20,-10 L25,0 L-10,10 L-15,25 L-5,10 L-20,10 Z" fill="url(#brandGradient)" />
    <circle cx="25" cy="0" r="4" fill="#FFFFFF" />
  </g>

  <!-- Content -->
  <text x="320" y="280" class="title">Autopilot CLI</text>
  <text x="320" y="340" class="subtitle">Intelligent Git automation with safety rails.</text>
  
  <rect x="320" y="380" width="120" height="40" rx="20" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-width="1" />
  <text x="345" y="408" class="version">v2.4.0</text>

  <!-- Footer Info -->
  <text x="100" y="550" font-family="sans-serif" font-size="20" fill="#64748B">Flow-state git operations for high-velocity teams.</text>
  <text x="1050" y="550" font-family="sans-serif" font-size="20" fill="#64748B" text-anchor="end">autopilot-cli.vercel.app</text>
</svg>

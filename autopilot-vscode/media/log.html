<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Autopilot Log</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: var(--vscode-editor-font-family, monospace);
    font-size: var(--vscode-editor-font-size, 13px);
    background: var(--vscode-editor-background);
    color: var(--vscode-editor-foreground);
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--vscode-editorGroupHeader-tabsBackground);
    border-bottom: 1px solid var(--vscode-editorWidget-border, #444);
    flex-shrink: 0;
  }
  .toolbar button {
    padding: 4px 10px;
    background: var(--vscode-button-secondaryBackground);
    color: var(--vscode-button-secondaryForeground);
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-family: var(--vscode-font-family);
    font-size: 0.85em;
  }
  .toolbar button:hover { background: var(--vscode-button-secondaryHoverBackground); }
  .toolbar label { font-size: 0.85em; display: flex; align-items: center; gap: 5px; cursor: pointer; }
  .toolbar .spacer { flex: 1; }
  .status-bar {
    padding: 4px 12px;
    font-size: 0.8em;
    color: var(--vscode-descriptionForeground);
    background: var(--vscode-editorGroupHeader-tabsBackground);
    border-bottom: 1px solid var(--vscode-editorWidget-border, #333);
    flex-shrink: 0;
  }
  #log-container {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
  }
  .log-line {
    display: flex;
    gap: 12px;
    padding: 1px 0;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .ts {
    color: var(--vscode-descriptionForeground);
    flex-shrink: 0;
    font-size: 0.85em;
    padding-top: 1px;
  }
  .msg { flex: 1; }
  .line-success .msg { color: #4ec994; }
  .line-conflict .msg { color: #e5a550; }
  .line-error .msg   { color: #f48771; }
  .line-muted .msg   { color: var(--vscode-descriptionForeground); opacity: 0.75; }
</style>
</head>
<body>
<div class="toolbar">
  <button onclick="clearLog()">Clear</button>
  <button onclick="copyAll()">Copy all</button>
  <div class="spacer"></div>
  <label>
    <input type="checkbox" id="autoScroll" checked />
    Auto-scroll
  </label>
</div>
<div class="status-bar" id="statusBar">Waiting for log data...</div>
<div id="log-container"></div>

<script>
  const vscode = acquireVsCodeApi();
  const container = document.getElementById('log-container');
  const autoScrollCheckbox = document.getElementById('autoScroll');
  let logLines = [];
  let userScrolled = false;

  container.addEventListener('scroll', () => {
    const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 30;
    if (!atBottom) { userScrolled = true; }
    else { userScrolled = false; }
  });

  window.addEventListener('message', e => {
    const msg = e.data;

    if (msg.command === 'appendLines') {
      msg.lines.forEach(line => appendLine(line));
      if (autoScrollCheckbox.checked && !userScrolled) {
        container.scrollTop = container.scrollHeight;
      }
    }

    if (msg.command === 'updateStatus') {
      document.getElementById('statusBar').textContent = msg.status;
    }

    if (msg.command === 'clear') {
      logLines = [];
      container.innerHTML = '';
    }
  });

  function appendLine(raw) {
    logLines.push(raw);
    const el = document.createElement('div');
    el.className = 'log-line ' + classifyLine(raw);

    // Parse timestamp out of [ISO] format
    const match = raw.match(/^\[([^\]]+)\] (.*)/s);
    if (match) {
      const ts = document.createElement('span');
      ts.className = 'ts';
      ts.textContent = formatTs(match[1]);
      const msg = document.createElement('span');
      msg.className = 'msg';
      msg.textContent = match[2];
      el.appendChild(ts);
      el.appendChild(msg);
    } else {
      const msg = document.createElement('span');
      msg.className = 'msg';
      msg.textContent = raw;
      el.appendChild(msg);
    }
    container.appendChild(el);
  }

  function formatTs(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleTimeString('en-GB', { hour12: false });
    } catch { return iso; }
  }

  function classifyLine(line) {
    const l = line.toLowerCase();
    if (l.includes('pushed') || l.includes('succeeded') || l.includes('success')) return 'line-success';
    if (l.includes('conflict')) return 'line-conflict';
    if (l.includes('error') || l.includes('failed') || l.includes('❌')) return 'line-error';
    if (l.includes('watching') || l.includes('debounce') || l.includes('debug')) return 'line-muted';
    return '';
  }

  function clearLog() {
    logLines = [];
    container.innerHTML = '';
  }

  function copyAll() {
    vscode.postMessage({ command: 'copyAll', text: logLines.join('\n') });
  }

  vscode.postMessage({ command: 'ready' });
</script>
</body>
</html>

  <circle cx="50" cy="50" r="7" fill="white"/>
  <!-- Small git branch dots -->
  <circle cx="28" cy="72" r="4" fill="white" opacity="0.7"/>
  <circle cx="50" cy="78" r="4" fill="white" opacity="0.7"/>
  <circle cx="72" cy="72" r="4" fill="white" opacity="0.7"/>
  <line x1="28" y1="72" x2="50" y2="78" stroke="white" stroke-width="2" opacity="0.7"/>
